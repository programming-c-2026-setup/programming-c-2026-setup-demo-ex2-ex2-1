name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: q1 - example test
      id: q1-example-test
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: q1 - example test
        setup-command: "./runme"
        command: 'gcc '
        input: |-
          1
          -3
          0
          89
          88
          -1
        expected-output: |-
          Select a question to run (1/2): Please enter grade:
          Invalid grade.
          Please enter grade:
          Final grade: 2
          Current average after factor: 2.00
          Please enter grade:
          Final grade: 100
          Current average after factor: 51.00
          Please enter grade:
          Final grade: 99
          Current average after factor: 67.00
          Please enter grade:
        comparison-method: exact
        timeout: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        Q1-EXAMPLE-TEST_RESULTS: "${{steps.q1-example-test.outputs.result}}"
      with:
        runners: q1-example-test
